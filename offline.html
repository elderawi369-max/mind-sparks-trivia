<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Sparks Trivia – Offline</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050816;
      --surface: #141932;
      --accent: #00d9ff;
      --text: #f5f7ff;
      --muted: #8f9abf;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f3460 0, var(--bg) 60%);
      color: var(--text);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 24px 20px;
      max-width: 360px;
      width: calc(100% - 32px);
      text-align: center;
      box-shadow: 0 18px 45px rgba(0,0,0,0.65);
    }
    .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 1.4rem;
      margin: 0 0 6px;
    }
    p {
      margin: 0 0 16px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 10px 20px;
      background: var(--accent);
      color: #02030a;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📶❌</div>
    <h1>You're offline</h1>
    <p>Mind Sparks Trivia could not reach the server. Check your connection and try again.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
